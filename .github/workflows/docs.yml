name: "Docs"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".assets/**"
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        env:
          DOCS_BASE: "/dotfiles/"
          DOCS_SITE: "https://gandharikos.github.io/dotfiles"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    name: "Deploy"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
