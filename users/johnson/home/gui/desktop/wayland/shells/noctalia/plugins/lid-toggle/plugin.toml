id = "johnson/lid_toggle"
name = "Lid Toggle"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "johnson"
license = "MIT"
dependencies = []
icon = "device-laptop"
description = "Toggle lid mode and mirror its state in the bar."
tags = ["lid", "laptop", "power"]

[[widget]]
id = "toggle"
entry = "lid_toggle.luau"

  [[widget.setting]]
  key = "command"
  type = "string"
  label = "Command"
  description = "Command used to control lid mode."
  default = "lid"

  [[widget.setting]]
  key = "notify"
  type = "bool"
  label = "Notify"
  description = "Show a notification after clicking the button."
  default = true
